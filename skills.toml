[defaults]
init_release = true
package_formats = [
  "tar.gz",
]
package_allowlist = [
  "SKILL.md",
  "agents/",
  "config/",
  "references/",
  "scripts/",
  "assets/",
]
required_files = [
  "SKILL.md",
  "agents/openai.yaml",
]
sync_exclude_globs = [
  ".DS_Store",
  "**/.DS_Store",
  "*.local.*",
  "**/*.local.*",
  "*.local.json",
  "**/*.local.json",
]
forbidden_package_globs = [
  ".DS_Store",
  "**/.DS_Store",
  "*.local.*",
  "**/*.local.*",
  "*.local.json",
  "**/*.local.json",
  "*.test.md",
  "*.filtered-test.md",
  "*.skill-test.md",
  "*-report-*.md",
  "__pycache__/*",
  "**/__pycache__/*",
  "*.pyc",
]
forbidden_init_patterns = [
  "codex-session-report-[0-9]{4}-[0-9]{2}-[0-9]{2}",
  "codex-daily-submit-[0-9]{4}-[0-9]{2}",
  "filtered-test",
  "skill-test",
  "测试输出今天的日报",
  "测试今日的",
  "脚本需要写进skill",
  "日报总结的skill",
  "/Users/[^/[:space:]`]+/",
]

[skills."notion-task-manager"]
path = "skills/notion-task-manager"
maintenance_path = "/Users/stealmac/.codex/skills/notion-task-manager"

interface:
  display_name: "DBC Skill"
  short_description: "Runtime inspection via DBC APIs"
  default_prompt: "Use $dbc-skill only for runtime inspection through a running DBC backend. On first run, ask only for backend host/IP and port, persist them into the skill-owned target config, then reuse that configured target on later runs without guessing or probing fallback targets. Do not read or edit DBC backend code, repository configs, control docs, or WORKLOG from this runtime skill. For normal single-instance巡检, run the smoke script with default work-report output and paste stdout exactly. If the user asks for a concrete historical time or explicit time range, use POST /api/v1/inspections/run-at with inspection_start plus time_window; the evaluated interval is [inspection_start, inspection_start + time_window). Oracle is separate from PMM inspection routing: do not use /instances or /inspections/* for Oracle, start from GET /api/v1/awr-report/list, then use /api/v1/awr-report/summary or /html. Current Oracle windows are fixed to 08:00-09:00 and 14:00-15:00 Asia/Shanghai only. Default SQL output is capped at 5 template rows and only returns SQL with avg_ms > 1000. Slow SQL output is template-first: show query_id as 模板ID, template-level avg_ms/exec_count/load, template SQL or fingerprint, and one representative concrete SQL when the backend provides it. For Oracle AWR output, every emitted SQL row must show exec_count and avg_ms before the SQL body, and if no SQL passes the 1s filter but the report contains top SQL evidence, include one compact Oracle Top SQL summary line with query_id, exec_count, and avg_ms. Do not rewrite, rename, translate, summarize, or compress SQL fenced blocks. In 关键发现, do not leave 异常指标 at only risk/rules when rule metrics are available; include concrete metric highlights such as select_full_join or tmp_disk_tables, but suppress memory-only anomaly findings when memory_used_percent < 90. For full-scope/all-instance/scheduled inspection, default $dbc-skill 全量巡检 uses backend POST /api/v1/inspections/batch, not client-side chunked all-instances. Backend batch is source-aware: same source_type is strictly serial, PMM1 and PMM3 may run in parallel, delay_seconds separates instances in the same source, write_html defaults false, max_instances_per_source defaults 20 and must be raised for real full runs. Do not recommend concurrency except as legacy compatibility. Poll batch status and return only batch_id, status, submitted, succeeded, failed, progress_pct, source_progress, current_source_type, current_instance_key, failed_results, and optional top risk summary after follow-up report lookup. Do not return full SQL, full report JSON, or HTML by default."
